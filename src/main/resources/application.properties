quarkus.application.name=loan-engine
quarkus.application.version=1.0.0
quarkus.http.port=8081
# =====================================================
# DATASOURCE CONFIGURATION
# =====================================================
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=root
quarkus.datasource.password=root
quarkus.datasource.jdbc=false
quarkus.datasource.reactive.url=mysql://localhost:3306/amartha_loans_dev

# Hibernate Reactive
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.database.generation=validate

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# =====================================================
# SECURITY - HTTP Basic
# =====================================================
quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.staff=staff123
quarkus.security.users.embedded.roles.staff=staff
quarkus.security.users.embedded.users.investor=investor123
quarkus.security.users.embedded.roles.investor=investor
quarkus.security.users.embedded.users.field_officer=field123
quarkus.security.users.embedded.roles.field_officer=field_officer
quarkus.security.users.embedded.users.admin=admin123
quarkus.security.users.embedded.roles.admin=admin

# =====================================================
# MAILER (Mailpit Dev Service)
# =====================================================
quarkus.mailer.from=noreply@amartha-loans.local

# =====================================================
# FILE STORAGE
# =====================================================
loan.storage.upload-dir=/tmp/amartha-loans/uploads

# =====================================================
# OBSERVABILITY
# =====================================================
quarkus.smallrye-health.ui.always-include=true
quarkus.swagger-ui.always-include=true

# =====================================================
# LOGGING
# =====================================================
quarkus.log.level=INFO
quarkus.log.category."com.amartha.loan".level=DEBUG

# =====================================================
# TEST INTEGRATION PROFILE
# =====================================================
%test.quarkus.datasource.reactive.url=mysql://localhost:3306/amartha_loans_dev


# =====================================================
# DEVELOPMENT PROFILE
# =====================================================
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.log.level=DEBUG
%dev.quarkus.log.category."io.quarkus.flyway".level=INFO


